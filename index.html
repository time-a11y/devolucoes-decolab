      const rows=[['ID','Arquivo','Original','Tipo','Status','Origem','Contexto','Código','Pedido','Documento','SKU','Produto/Destino','Usuario','Data','Tamanho original','Tamanho final','Comprimida','Observacao']];
      (allEvidence()||[]).forEach(ev=>rows.push([ev.id,ev.name,ev.originalName||'',ev.evidenceType||evidenceGroup(ev),ev.status||'Ativa',ev.transferId?'Transferência':ev.returnId?'Devolução':ev.context_type||'',ev.context_type||'',ev.returnCode||ev.transferCode||'',ev.orderNumber||'',ev.invoiceNumber||'',ev.sku||'',ev.product||'',ev.uploadedBy||'',brDate(ev.uploadedAt),ev.originalSize||ev.size||0,ev.size||0,ev.compressed?'Sim':'Não',ev.notes||'']));
      download('central-evidencias.csv',rows.map(row=>row.map(csvEscape).join(';')).join('\n'),'text/csv;charset=utf-8');
    };

  })();


  /* === MODO ONLINE SUPABASE - Cloudflare Pages + Supabase Free === */
  (function(){
    const SUPABASE_DEFAULT_URL = 'https://wiehiqiuojcwcrnikiqs.supabase.co';
    const SUPABASE_DEFAULT_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndpZWhpcWl1b2pjd2NybmlraXFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NjMyMTMsImV4cCI6MjA5NDMzOTIxM30.BFdyC9R39D8KkMTUe6_MAxjuvs8igNhj9FT87d1Ilj8';
    let supabaseClient = null;
    let onlineSaveTimer = null;
    let onlineIsSaving = false;

    function ensureSupabaseConfig(){
      state.supabase = state.supabase || {
        enabled: true,
        url: SUPABASE_DEFAULT_URL,
        anonKey: SUPABASE_DEFAULT_ANON_KEY,
        bucket: 'evidencias',
        stateId: 'decolab-main',
        lastSyncAt: '',
        lastError: '',
        mode: 'hybrid'
      };
      state.supabase.url = (state.supabase.url || SUPABASE_DEFAULT_URL).replace(/\/rest\/v1\/?$/,'');
      state.supabase.anonKey = state.supabase.anonKey || SUPABASE_DEFAULT_ANON_KEY;
      state.supabase.bucket = state.supabase.bucket || 'evidencias';
      state.supabase.stateId = state.supabase.stateId || 'decolab-main';
      if(typeof state.supabase.enabled === 'undefined') state.supabase.enabled = true;
    }

    function getSupabase(){
      ensureSupabaseConfig();
      if(!state.supabase.enabled) return null;
      if(!window.supabase){ state.supabase.lastError = 'Biblioteca Supabase não carregada.'; return null; }
      if(!supabaseClient || supabaseClient.__url !== state.supabase.url){
        supabaseClient = window.supabase.createClient(state.supabase.url, state.supabase.anonKey);
        supabaseClient.__url = state.supabase.url;
      }
      return supabaseClient;
    }

    function supabaseStatusBadge(){
      ensureSupabaseConfig();
      if(!state.supabase.enabled) return '<span class="badge gray">Offline local</span>';
      if(state.supabase.lastError) return '<span class="badge red">Supabase com erro</span>';
      return '<span class="badge green">Supabase ativo</span>';
    }

    function dataUrlToBlob(dataUrl){
      return fetch(dataUrl).then(r => r.blob());
    }

    function safeFileName(name){
      return String(name||'evidencia').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9._-]+/g,'-').replace(/^-+|-+$/g,'').slice(0,120) || 'evidencia';
    }

    async function uploadEvidenceToSupabase(ev){
      const sb = getSupabase();
      if(!sb || !ev || ev.storageUrl || !ev.dataUrl || String(ev.dataUrl).startsWith('http')){
        if(ev && ev.dataUrl && String(ev.dataUrl).startsWith('http')) ev.storageUrl = ev.dataUrl;
        return ev;
      }
      if(!String(ev.dataUrl).startsWith('data:')) return ev;
      const blob = await dataUrlToBlob(ev.dataUrl);
      const folder = ev.transferId ? `transfers/${ev.transferId}` : ev.returnId ? `returns/${ev.returnId}` : 'general';
      const path = `${folder}/${ev.id}-${safeFileName(ev.name || ev.originalName || 'evidencia')}`;
      const { error } = await sb.storage.from(state.supabase.bucket).upload(path, blob, { upsert:true, contentType: ev.type || blob.type || 'application/octet-stream' });
      if(error) throw error;
      const { data } = sb.storage.from(state.supabase.bucket).getPublicUrl(path);
      ev.storageProvider = 'supabase';
      ev.storagePath = path;
      ev.storageUrl = data.publicUrl;
      ev.dataUrl = ev.storageUrl;
      if(ev.preview) ev.preview = ev.storageUrl;
      if(ev.thumbnail) ev.thumbnail = ev.storageUrl;
      ev.syncedAt = nowIso();
      return ev;
    }

    async function uploadAllEvidenceToSupabase(){
      const evs = typeof allEvidenceCombined === 'function' ? allEvidenceCombined() : (typeof allEvidence === 'function' ? allEvidence() : []);
      let ok = 0;
      for(const ev of evs){
        try{ await uploadEvidenceToSupabase(ev); ok++; }catch(e){ console.warn('Falha upload evidência', ev?.name, e); state.supabase.lastError = `Falha ao enviar evidência ${ev?.name || ''}: ${e.message || e}`; }
      }
      return ok;
    }

    function serializeStateForSupabase(){
      ensureSupabaseConfig();
      const cloned = structuredClone(state);
      cloned.session = null;
      cloned.route = 'dashboard';
      cloned.pendingInvoice = null;
      cloned.pendingXmlText = '';
      return cloned;
    }

    async function saveStateToSupabase(manual=false){
      const sb = getSupabase();
      if(!sb || onlineIsSaving) return;
      onlineIsSaving = true;
      try{
        await uploadAllEvidenceToSupabase();
        const payload = serializeStateForSupabase();
        const { error } = await sb.from('app_state').upsert({ id: state.supabase.stateId, data: payload, updated_at: new Date().toISOString() });
        if(error) throw error;
        state.supabase.lastSyncAt = nowIso();
        state.supabase.lastError = '';
        localStorage.setItem(APP_KEY, JSON.stringify({...JSON.parse(localStorage.getItem(APP_KEY)||'{}'), supabase: state.supabase}));
        if(manual) alert('Dados enviados para o Supabase com sucesso.');
      }catch(e){
        console.error(e);
        state.supabase.lastError = e.message || String(e);
        if(manual) alert('Erro ao enviar para Supabase: ' + state.supabase.lastError + '\n\nConfira se você executou o SQL de criação das tabelas e bucket.');
      }finally{ onlineIsSaving = false; }
    }

    function scheduleSupabaseSave(){
      ensureSupabaseConfig();
      if(!state.supabase.enabled) return;
      clearTimeout(onlineSaveTimer);
      onlineSaveTimer = setTimeout(() => saveStateToSupabase(false), 1200);
    }

    async function loadStateFromSupabase(){
      const sb = getSupabase();
      if(!sb) return alert('Supabase não está ativo.');
      try{
        const { data, error } = await sb.from('app_state').select('data,updated_at').eq('id', state.supabase.stateId).maybeSingle();
        if(error) throw error;
        if(!data || !data.data) return alert('Ainda não existe estado salvo no Supabase. Use “Enviar base local para Supabase”.');
        const keepSession = state.session;
        const keepRoute = state.route;
        const cfg = state.supabase;
        state = {...structuredClone(initialState), ...data.data, session: keepSession, route: keepRoute, pendingInvoice:null, pendingXmlText:''};
        state.supabase = cfg;
        state.supabase.lastSyncAt = nowIso();
        state.supabase.lastError = '';
        localStorage.setItem(APP_KEY, JSON.stringify(state));
        alert('Base carregada do Supabase.');
        render();
      }catch(e){
        console.error(e);
        state.supabase.lastError = e.message || String(e);
        alert('Erro ao carregar Supabase: ' + state.supabase.lastError);
      }
    }

    async function testSupabaseConnection(){
      const sb = getSupabase();
      if(!sb) return alert('Supabase não está ativo.');
      try{
        const { error } = await sb.from('app_state').select('id').limit(1);
        if(error) throw error;
        state.supabase.lastError = '';
        state.supabase.lastSyncAt = nowIso();
        save();
        alert('Conexão com Supabase OK.');
      }catch(e){
        state.supabase.lastError = e.message || String(e);
        save();
        alert('Erro na conexão: ' + state.supabase.lastError + '\n\nExecute o arquivo supabase_setup.sql no SQL Editor do Supabase.');
      }
    }

    window.renderOnlineSupabase = function(){
      ensureSupabaseConfig();
      const evs = typeof allEvidenceCombined === 'function' ? allEvidenceCombined() : [];
      const pendingStorage = evs.filter(ev => ev.dataUrl && String(ev.dataUrl).startsWith('data:') && !ev.storageUrl).length;
      return `<section class="grid cols-4">
        ${metricCard('Modo', state.supabase.enabled ? 'Online híbrido' : 'Local', 'Cloudflare + Supabase', '☁')}
        ${metricCard('Devoluções', (state.returns||[]).length, 'Registros locais/sincronizados', '▤')}
        ${metricCard('Evidências', evs.length, `${pendingStorage} pendente(s) de storage`, '▧')}
        ${metricCard('Última sync', state.supabase.lastSyncAt ? brDate(state.supabase.lastSyncAt) : '-', 'Sincronização Supabase', '↻')}
      </section>
      <div class="card" style="margin-top:18px">
        <div class="split"><div><h2>Online / Supabase</h2><p>Use esta área para sincronizar o app publicado no Cloudflare Pages com o Supabase Free.</p></div>${supabaseStatusBadge()}</div>
        ${state.supabase.lastError ? `<div class="alert critica" style="margin-top:12px"><strong>!</strong><div>${esc(state.supabase.lastError)}</div></div>` : ''}
        <div class="form-grid two" style="margin-top:16px">
          <div class="field"><label>Supabase URL</label><input value="${esc(state.supabase.url)}" onchange="state.supabase.url=this.value.replace(/\\/rest\\/v1\\/?$/,''); supabaseClient=null; save();"></div>
          <div class="field"><label>Anon public key</label><input value="${esc(state.supabase.anonKey)}" onchange="state.supabase.anonKey=this.value; supabaseClient=null; save();"></div>
          <div class="field"><label>Bucket de evidências</label><input value="${esc(state.supabase.bucket)}" onchange="state.supabase.bucket=this.value; save();"></div>
          <div class="field"><label>ID da base compartilhada</label><input value="${esc(state.supabase.stateId)}" onchange="state.supabase.stateId=this.value; save();"></div>
          <div class="field"><label>Sincronização automática</label><select onchange="state.supabase.enabled=this.value==='true'; save(); render();"><option value="true" ${state.supabase.enabled?'selected':''}>Ativa</option><option value="false" ${!state.supabase.enabled?'selected':''}>Desativada</option></select></div>
        </div>
        <div class="row-actions" style="margin-top:16px">
          <button class="btn" onclick="testSupabaseConnection()">Testar conexão</button>
          <button class="btn primary" onclick="saveStateToSupabase(true)">Enviar base local para Supabase</button>
          <button class="btn" onclick="loadStateFromSupabase()">Carregar base do Supabase</button>
          <button class="btn" onclick="uploadAllEvidenceToSupabase().then(n=>{save(); alert('Evidências processadas: '+n); render();})">Enviar evidências para Storage</button>
        </div>
      </div>
      <div class="card" style="margin-top:18px"><h2>Passos necessários no Supabase</h2><ol><li>Abra o Supabase → SQL Editor.</li><li>Execute o arquivo <strong>supabase_setup.sql</strong> que acompanha este pacote.</li><li>Publique este <strong>index.html</strong> no Cloudflare Pages.</li><li>Abra o app publicado e use <strong>Testar conexão</strong>.</li><li>Use <strong>Enviar base local para Supabase</strong> para migrar seus dados atuais.</li></ol><p class="hint">MVP gratuito: o estado operacional fica na tabela app_state e as evidências vão para o bucket evidencias.</p></div>`;
    };

    window.testSupabaseConnection = testSupabaseConnection;
    window.saveStateToSupabase = saveStateToSupabase;
    window.loadStateFromSupabase = loadStateFromSupabase;
    window.uploadAllEvidenceToSupabase = uploadAllEvidenceToSupabase;

    // Complementa menu/rotas sem remover módulos já existentes.
    const prevRenderSidebar = window.renderSidebar || renderSidebar;
    window.renderSidebar = function(){
      let html = prevRenderSidebar();
      if(html.includes("nav('online')")) return html;
      const btn = `<button class="${state.route==='online'?'active':''}" onclick="nav('online')"><span>☁</span>Online / Supabase</button>`;
      return html.replace('</nav>', btn + '</nav>');
    };
    const prevRenderRoute = window.renderRoute || renderRoute;
    window.renderRoute = function(){
      if(state.route === 'online') return renderOnlineSupabase();
      return prevRenderRoute();
    };

    const prevSaveSupabase = window.save || save;
    window.save = function(){
      prevSaveSupabase();
      try{
        ensureSupabaseConfig();
        const raw = JSON.parse(localStorage.getItem(APP_KEY)||'{}');
        raw.supabase = state.supabase;
        localStorage.setItem(APP_KEY, JSON.stringify(raw));
      }catch(e){}
      scheduleSupabaseSave();
    };

    ensureSupabaseConfig();
    // Não carrega a base remota automaticamente para evitar sobrescrever dados locais sem confirmação.
  })();

render();
</script>
