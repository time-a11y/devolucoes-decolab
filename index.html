<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Devoluções NF-e | Conferência e Gestão</title>
  <style>
    :root{
      --bg:#f4f7fb;
      --panel:#ffffff;
      --ink:#172033;
      --muted:#667085;
      --line:#e6eaf2;
      --primary:#2563eb;
      --primary-2:#1d4ed8;
      --green:#16a34a;
      --yellow:#d97706;
      --orange:#ea580c;
      --red:#dc2626;
      --blue:#0284c7;
      --gray:#64748b;
      --purple:#7c3aed;
      --shadow:0 18px 45px rgba(15,23,42,.08);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--ink);
      background:radial-gradient(circle at top left,#e0f2fe 0,#f6f8fb 36%,#eef2ff 100%);
    }
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    .login-page{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
    }
    .login-card{
      width:min(1020px,100%);
      display:grid;
      grid-template-columns:1.1fr .9fr;
      background:rgba(255,255,255,.88);
      border:1px solid rgba(255,255,255,.55);
      border-radius:30px;
      box-shadow:var(--shadow);
      overflow:hidden;
      backdrop-filter:blur(12px);
    }
    .hero{
      padding:54px;
      background:linear-gradient(135deg,#0f172a,#1e3a8a 60%,#0369a1);
      color:#fff;
      position:relative;
      min-height:590px;
    }
    .hero:after{
      content:"";
      position:absolute;
      inset:auto -110px -110px auto;
      width:310px;height:310px;border-radius:999px;
      background:rgba(255,255,255,.12);
    }
    .logo{
      display:flex;align-items:center;gap:12px;font-weight:800;font-size:22px;letter-spacing:-.04em;
    }
    .logo-mark{
      width:42px;height:42px;border-radius:14px;
      display:grid;place-items:center;
      background:linear-gradient(135deg,#38bdf8,#2563eb);
      box-shadow:0 12px 24px rgba(37,99,235,.35);
      color:#fff;font-weight:900;
    }
    .hero h1{font-size:46px;line-height:1.02;margin:70px 0 18px;letter-spacing:-.06em}
    .hero p{font-size:18px;line-height:1.65;color:#dbeafe;max-width:560px}
    .hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:38px}
    .hero-chip{padding:16px;border:1px solid rgba(255,255,255,.18);border-radius:18px;background:rgba(255,255,255,.08);color:#e0f2fe}
    .login-form{padding:54px;display:flex;flex-direction:column;justify-content:center}
    .login-form h2{font-size:32px;margin:0 0 8px;letter-spacing:-.04em}
    .login-form p{color:var(--muted);margin:0 0 28px;line-height:1.5}
    label{display:block;font-size:13px;font-weight:700;margin:0 0 8px;color:#344054}
    input,select,textarea{
      width:100%;
      border:1px solid var(--line);
      border-radius:13px;
      background:#fff;
      padding:12px 14px;
      outline:none;
      transition:.18s ease;
      color:var(--ink);
    }
    input:focus,select:focus,textarea:focus{border-color:#93c5fd;box-shadow:0 0 0 4px rgba(59,130,246,.12)}
    textarea{min-height:96px;resize:vertical}
    .field{margin-bottom:16px}
    .btn{
      border:0;border-radius:13px;padding:12px 16px;font-weight:800;
      background:#eef2ff;color:#1e40af;
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      transition:.18s ease;text-decoration:none;
    }
    .btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(15,23,42,.08)}
    .btn.primary{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff}
    .btn.danger{background:#fee2e2;color:#991b1b}
    .btn.success{background:#dcfce7;color:#166534}
    .btn.warning{background:#ffedd5;color:#9a3412}
    .btn.ghost{background:transparent;color:#475467;border:1px solid var(--line)}
    .btn.small{padding:8px 10px;border-radius:10px;font-size:12px}
    .hint{font-size:12px;color:var(--muted);line-height:1.5}
    .error{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;border-radius:12px;padding:12px;margin-bottom:14px}
    .app-shell{display:grid;grid-template-columns:280px 1fr;min-height:100vh}
    .sidebar{
      padding:24px;
      background:rgba(255,255,255,.88);
      border-right:1px solid rgba(230,234,242,.85);
      backdrop-filter:blur(12px);
      position:sticky;top:0;height:100vh;
    }
    .nav{margin-top:28px;display:grid;gap:8px}
    .nav button{
      border:0;text-align:left;padding:12px 14px;border-radius:13px;background:transparent;color:#475467;
      display:flex;align-items:center;gap:11px;font-weight:750;
    }
    .nav button.active,.nav button:hover{background:#eff6ff;color:#1d4ed8}
    .side-footer{position:absolute;bottom:24px;left:24px;right:24px;padding-top:18px;border-top:1px solid var(--line)}
    .user-mini{display:flex;gap:10px;align-items:center}
    .avatar{width:38px;height:38px;border-radius:14px;background:#e0f2fe;color:#0369a1;font-weight:900;display:grid;place-items:center}
    .main{padding:28px;min-width:0}
    .topbar{display:flex;justify-content:space-between;gap:18px;align-items:center;margin-bottom:24px}
    .topbar h1{font-size:28px;margin:0;letter-spacing:-.04em}
    .topbar p{margin:4px 0 0;color:var(--muted)}
    .searchbar{display:flex;gap:12px;align-items:center;min-width:min(540px,100%)}
    .grid{display:grid;gap:18px}
    .grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .card{
      background:rgba(255,255,255,.92);
      border:1px solid rgba(230,234,242,.92);
      border-radius:var(--radius);
      box-shadow:0 12px 30px rgba(15,23,42,.05);
      padding:20px;
    }
    .card h2,.card h3{margin:0 0 12px;letter-spacing:-.03em}
    .card p{color:var(--muted);line-height:1.55}
    .metric{
      display:flex;align-items:flex-start;justify-content:space-between;gap:14px;
      min-height:132px;
    }
    .metric .number{font-size:32px;font-weight:900;letter-spacing:-.05em;margin:8px 0}
    .metric .label{color:var(--muted);font-size:13px;font-weight:700}
    .iconbox{width:44px;height:44px;border-radius:15px;display:grid;place-items:center;background:#eff6ff;color:#1d4ed8;font-weight:900}
    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:15px}
    table{border-collapse:collapse;width:100%;background:#fff;min-width:860px}
    th,td{padding:12px 14px;border-bottom:1px solid var(--line);text-align:left;font-size:13px;vertical-align:top}
    th{background:#f8fafc;color:#475467;font-weight:850;position:sticky;top:0}
    tr:hover td{background:#f9fbff}
    .badge{
      display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;
      font-size:12px;font-weight:850;white-space:nowrap;
    }
    .badge.green{background:#dcfce7;color:#166534}
    .badge.yellow{background:#fef3c7;color:#92400e}
    .badge.orange{background:#ffedd5;color:#9a3412}
    .badge.red{background:#fee2e2;color:#991b1b}
    .badge.blue{background:#e0f2fe;color:#075985}
    .badge.gray{background:#f1f5f9;color:#475569}
    .badge.purple{background:#ede9fe;color:#5b21b6}
    .row-actions{display:flex;gap:8px;flex-wrap:wrap}
    .progress{
      height:10px;background:#e2e8f0;border-radius:999px;overflow:hidden;
    }
    .progress span{display:block;height:100%;background:linear-gradient(90deg,#2563eb,#06b6d4);border-radius:999px}
    .steps{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px}
    .step{
      padding:12px;border:1px solid var(--line);background:#fff;border-radius:15px;color:#64748b;font-weight:800;font-size:12px;
    }
    .step.active{border-color:#93c5fd;background:#eff6ff;color:#1d4ed8}
    .dropzone{
      border:2px dashed #bfdbfe;
      background:#eff6ff;
      border-radius:20px;
      padding:26px;
      text-align:center;
    }
    .dropzone strong{display:block;margin-bottom:8px}
    .form-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
    .form-grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}
    .alert-list{display:grid;gap:10px}
    .alert{
      display:flex;gap:12px;align-items:flex-start;padding:13px;border-radius:14px;border:1px solid;
    }
    .alert.critica{background:#fef2f2;border-color:#fecaca;color:#991b1b}
    .alert.media{background:#fffbeb;border-color:#fde68a;color:#92400e}
    .alert.baixa{background:#eff6ff;border-color:#bfdbfe;color:#1e40af}
    .item-card{
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      background:#fff;
    }
    .item-head{display:flex;gap:14px;align-items:flex-start;margin-bottom:14px}
    .product-thumb{
      width:64px;height:64px;border-radius:15px;background:linear-gradient(135deg,#e0f2fe,#eef2ff);
      display:grid;place-items:center;color:#2563eb;font-weight:900;flex:0 0 auto;
    }
    .muted{color:var(--muted)}
    .split{display:flex;justify-content:space-between;align-items:center;gap:14px}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
    .tabs button{border:1px solid var(--line);background:#fff;padding:9px 12px;border-radius:999px;color:#475467;font-weight:800}
    .tabs button.active{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
    .kpi-bar{height:12px;background:#eef2f7;border-radius:999px;overflow:hidden}
    .kpi-bar span{height:100%;display:block;border-radius:999px;background:#2563eb}
    .timeline{display:grid;gap:10px;max-height:460px;overflow:auto}
    .timeline-entry{border-left:3px solid #bfdbfe;padding:8px 12px;background:#fff;border-radius:0 12px 12px 0}
    .timeline-entry strong{display:block}
    .timeline-entry small{color:#667085}
    .evidence-grid{display:flex;gap:10px;flex-wrap:wrap}
    .evidence{
      border:1px solid var(--line);border-radius:12px;padding:10px;background:#f8fafc;min-width:150px;max-width:220px;
    }
    .evidence img{width:100%;max-height:110px;object-fit:cover;border-radius:10px;margin-top:8px}
    .empty{
      border:1px dashed #cbd5e1;background:#f8fafc;color:#64748b;border-radius:18px;padding:30px;text-align:center;
    }
    .print-only{display:none}
    @media(max-width:1100px){
      .app-shell{grid-template-columns:1fr}
      .sidebar{position:relative;height:auto}
      .side-footer{position:relative;bottom:auto;left:auto;right:auto;margin-top:24px}
      .main{padding:18px}
      .grid.cols-4,.grid.cols-3,.grid.cols-2,.form-grid,.form-grid.two{grid-template-columns:1fr}
      .login-card{grid-template-columns:1fr}
      .hero{min-height:auto;padding:34px}
      .hero h1{font-size:34px;margin-top:42px}
      .login-form{padding:34px}
      .topbar{display:grid}
      .steps{grid-template-columns:1fr}
    }
    @media print{
      body{background:#fff}
      .sidebar,.topbar,.no-print,.btn,.tabs{display:none!important}
      .app-shell{display:block}
      .main{padding:0}
      .card{box-shadow:none;border:0}
      .print-only{display:block}
    }
  </style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const APP_KEY = 'devolucoes_nfe_app_v1';

const DEFAULT_USERS = [
  {id:'u-admin', name:'Administrador', email:'admin@devolucoes.local', password:'admin123', role:'Administrador'},
  {id:'u-conf', name:'Conferente', email:'conferente@devolucoes.local', password:'123456', role:'Conferente'},
  {id:'u-sup', name:'Supervisor', email:'supervisor@devolucoes.local', password:'123456', role:'Supervisor'},
  {id:'u-aud', name:'Auditor', email:'auditor@devolucoes.local', password:'123456', role:'Auditor'}
];

const ROLES = {
  'Administrador':['all'],
  'Supervisor':['create_return','inspect','approve','reports','audit','settings','stock'],
  'Conferente':['create_return','inspect','reports','stock'],
  'Auditor':['reports','audit'],
  'Atendimento':['create_return','reports'],
  'Estoque':['create_return','inspect','stock','reports'],
  'Financeiro':['reports','audit']
};

const STATUS_COLOR = {
  'Rascunho':'gray',
  'Aguardando validação':'yellow',
  'Nota validada':'blue',
  'Em conferência':'blue',
  'Conferência com divergência':'orange',
  'Aguardando aprovação':'yellow',
  'Aprovado para estoque':'green',
  'Quarentena':'orange',
  'Reparo/Reembalagem':'yellow',
  'Descarte':'red',
  'Contestação':'purple',
  'Finalizado':'gray',
  'Cancelado':'gray'
};

const DEST_COLOR = {
  'Reabastecimento':'green',
  'Quarentena':'orange',
  'Descarte':'red',
  'Troca':'blue',
  'Reparo/Reembalagem':'yellow',
  'Análise manual':'gray',
  'Contestação':'purple'
};

const SAMPLE_XML = `<?xml version="1.0" encoding="UTF-8"?>
<NFe>
  <infNFe Id="NFe35240512345678000190550010000012341000012345">
    <ide>
      <cUF>35</cUF>
      <natOp>Venda de mercadoria</natOp>
      <mod>55</mod>
      <serie>1</serie>
      <nNF>1234</nNF>
      <dhEmi>2026-05-01T10:30:00-03:00</dhEmi>
    </ide>
    <emit>
      <CNPJ>12345678000190</CNPJ>
      <xNome>Loja Exemplo LTDA</xNome>
    </emit>
    <dest>
      <CPF>12345678909</CPF>
      <xNome>Cliente Exemplo</xNome>
    </dest>
    <det nItem="1">
      <prod>
        <cProd>SKU-KIT-ORGANIZADOR-001</cProd>
        <cEAN>7891234567895</cEAN>
        <xProd>Kit Organizador Multiuso 3 Peças</xProd>
        <NCM>39249000</NCM>
        <CFOP>5102</CFOP>
        <uCom>UN</uCom>
        <qCom>2.0000</qCom>
        <vUnCom>49.9000</vUnCom>
        <vProd>99.80</vProd>
      </prod>
    </det>
    <det nItem="2">
      <prod>
        <cProd>SKU-TAPETE-ANTIDERRAPANTE-002</cProd>
        <cEAN>7899876543210</cEAN>
        <xProd>Tapete Antiderrapante Decorativo</xProd>
        <NCM>57050000</NCM>
        <CFOP>5102</CFOP>
        <uCom>UN</uCom>
        <qCom>1.0000</qCom>
        <vUnCom>89.9000</vUnCom>
        <vProd>89.90</vProd>
      </prod>
    </det>
    <total>
      <ICMSTot>
        <vNF>189.70</vNF>
      </ICMSTot>
    </total>
  </infNFe>
</NFe>`;

const initialState = {
  users: DEFAULT_USERS,
  session: null,
  route: 'dashboard',
  currentReturnId: null,
  pendingInvoice: null,
  pendingXmlText: '',
  returns: [],
  audit: [],
  rules: {
    maxReturnDays: 30,
    highValueThreshold: 250,
    minCriticalPhotos: 1,
    requireSupervisorForDiscard: true,
    requireSupervisorForContest: true,
    blockDuplicateInvoice: true,
    restockRequiresPackage: true,
    marketplaces: ['Amazon','Mercado Livre','Shopee','Loja própria','Outro']
  },
  filters: {
    returnSearch: '',
    reportStatus: 'Todos',
    reportMarketplace: 'Todos'
  }
};

let state = loadState();

function loadState(){
  try{
    const raw = localStorage.getItem(APP_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      return {...initialState, ...parsed, pendingInvoice:null, pendingXmlText:''};
    }
  }catch(e){}
  return structuredClone(initialState);
}

function save(){
  localStorage.setItem(APP_KEY, JSON.stringify({
    users: state.users,
    session: state.session,
    route: state.route,
    currentReturnId: state.currentReturnId,
    returns: state.returns,
    audit: state.audit,
    rules: state.rules,
    filters: state.filters
  }));
}

function uid(prefix='id'){
  return prefix + '-' + Math.random().toString(36).slice(2,8) + Date.now().toString(36).slice(-5);
}

function nowIso(){ return new Date().toISOString(); }

function brDate(value){
  if(!value) return '-';
  const d = new Date(value);
  if(Number.isNaN(d.getTime())) return value;
  return d.toLocaleString('pt-BR');
}

function money(value){
  const n = Number(value || 0);
  return n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}

function num(value){
  const n = Number(value || 0);
  return n.toLocaleString('pt-BR',{maximumFractionDigits:4});
}

function esc(v){
  return String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}

function cleanDigits(v){
  return String(v || '').replace(/\D/g,'');
}

function hasPermission(permission){
  if(!state.session) return false;
  const role = state.session.role;
  return (ROLES[role] || []).includes('all') || (ROLES[role] || []).includes(permission);
}

function addAudit(action, entityType='system', entityId='', detail=''){
  const user = state.session || {id:'system', name:'Sistema', role:'Sistema'};
  state.audit.unshift({
    id: uid('log'),
    at: nowIso(),
    userId: user.id,
    userName: user.name,
    role: user.role,
    action,
    entityType,
    entityId,
    detail,
    ip: 'local'
  });
  if(state.audit.length > 700) state.audit = state.audit.slice(0,700);
}

function addReturnAudit(ret, action, detail=''){
  if(!ret.audit) ret.audit = [];
  const user = state.session || {id:'system', name:'Sistema', role:'Sistema'};
  ret.audit.unshift({
    id: uid('rlog'),
    at: nowIso(),
    userName: user.name,
    role: user.role,
    action,
    detail
  });
  addAudit(action, 'devolução', ret.id, detail);
}

function render(){
  save();
  const app = document.getElementById('app');
  if(!state.session){
    app.innerHTML = renderLogin();
    return;
  }
  app.innerHTML = `
    <div class="app-shell">
      ${renderSidebar()}
      <main class="main">
        ${renderTopbar()}
        ${renderRoute()}
      </main>
    </div>
  `;
}

function renderLogin(){
  return `
    <section class="login-page">
      <div class="login-card">
        <div class="hero">
          <div class="logo"><div class="logo-mark">NF</div><span>ReturnFlow</span></div>
          <h1>Conferência de devoluções com rastreabilidade real.</h1>
          <p>Valide XML ou chave de acesso da NF-e, confira produtos item a item, registre evidências e defina o destino correto: estoque, quarentena, descarte, reparo ou contestação.</p>
          <div class="hero-grid">
            <div class="hero-chip">✓ Validação fiscal e operacional</div>
            <div class="hero-chip">✓ Auditoria por usuário e etapa</div>
            <div class="hero-chip">✓ Decisão automática por regras</div>
            <div class="hero-chip">✓ Relatórios e exportações</div>
          </div>
        </div>
        <form class="login-form" onsubmit="login(event)">
          <h2>Entrar no sistema</h2>
          <p>Use um dos acessos de demonstração para testar o fluxo completo.</p>
          <div id="loginError"></div>
          <div class="field">
            <label>E-mail</label>
            <input id="email" type="email" value="admin@devolucoes.local" autocomplete="username">
          </div>
          <div class="field">
            <label>Senha</label>
            <input id="password" type="password" value="admin123" autocomplete="current-password">
          </div>
          <button class="btn primary" type="submit">Acessar aplicativo</button>
          <p class="hint" style="margin-top:18px">
            Admin: admin@devolucoes.local / admin123<br>
            Conferente: conferente@devolucoes.local / 123456<br>
            Supervisor: supervisor@devolucoes.local / 123456
          </p>
        </form>
      </div>
    </section>
  `;
}

function login(event){
  event.preventDefault();
  const email = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  const user = state.users.find(u => u.email.toLowerCase() === email && u.password === password);
  if(!user){
    const el = document.getElementById('loginError');
    el.innerHTML = '<div class="error">Credenciais inválidas.</div>';
    addAudit('Tentativa de login inválida', 'usuário', email, 'Falha de autenticação');
    save();
    return;
  }
  state.session = {id:user.id, name:user.name, email:user.email, role:user.role};
  state.route = 'dashboard';
  addAudit('Login realizado', 'usuário', user.id, user.email);
  render();
}

function logout(){
  addAudit('Logout realizado', 'usuário', state.session.id, state.session.email);
  state.session = null;
  save();
  render();
}

function nav(route){
  state.route = route;
  if(route !== 'nova') {
    state.pendingInvoice = null;
    state.pendingXmlText = '';
  }
  render();
}

function renderSidebar(){
  const items = [
    ['dashboard','Painel','▦','reports'],
    ['nova','Nova devolução','＋','create_return'],
    ['devolucoes','Devoluções','▤','reports'],
    ['relatorios','Relatórios','◷','reports'],
    ['auditoria','Auditoria','⎋','audit'],
    ['configuracoes','Configurações','⚙','settings']
  ].filter(i => hasPermission(i[3]));
  return `
    <aside class="sidebar">

function handleXmlUpload(input){
  const file = input.files && input.files[0];
  if(!file) return;
  if(!file.name.toLowerCase().endsWith('.xml')){
    alert('Envie um arquivo XML válido.');
    return;
  }
  const reader = new FileReader();
  reader.onload = function(){
    try{
      const parsed = parseNFeXml(String(reader.result || ''));
      state.pendingInvoice = parsed;
      state.pendingXmlText = String(reader.result || '');
      addAudit('XML carregado para validação', 'arquivo', file.name, `${file.size} bytes`);
      render();
    }catch(e){
      alert(e.message);
    }
  };
  reader.readAsText(file);
}

function getTag(parent, tag){
  if(!parent) return null;
  return parent.getElementsByTagName(tag)[0] || (parent.getElementsByTagNameNS ? parent.getElementsByTagNameNS('*', tag)[0] : null);
}

function getTags(parent, tag){
  if(!parent) return [];
  const a = Array.from(parent.getElementsByTagName(tag));
  const b = parent.getElementsByTagNameNS ? Array.from(parent.getElementsByTagNameNS('*', tag)) : [];
  return a.length ? a : b;
}

function tagText(parent, tag){
  const el = getTag(parent, tag);
  return el ? (el.textContent || '').trim() : '';
}

function parseNumberBR(value){
  return Number(String(value || '0').replace(',','.')) || 0;
}

function parseNFeXml(xmlText){
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlText, 'application/xml');
  if(doc.getElementsByTagName('parsererror').length){
    throw new Error('XML inválido. Corrija o arquivo ou envie uma NF-e válida.');
  }
  const inf = getTag(doc, 'infNFe') || doc.documentElement;
  let accessKey = '';
  const id = inf && inf.getAttribute ? (inf.getAttribute('Id') || '') : '';
  if(id) accessKey = cleanDigits(id).slice(-44);
  if(!accessKey) accessKey = cleanDigits(tagText(doc, 'chNFe')).slice(0,44);

  const ide = getTag(doc, 'ide');
  const emit = getTag(doc, 'emit');
  const dest = getTag(doc, 'dest');
  const total = getTag(doc, 'ICMSTot') || getTag(doc, 'total');

  const items = getTags(doc, 'det').map((det, idx) => {
    const prod = getTag(det, 'prod') || det;
    const q = parseNumberBR(tagText(prod,'qCom') || tagText(prod,'qTrib'));
    const unit = parseNumberBR(tagText(prod,'vUnCom') || tagText(prod,'vUnTrib'));
    return {
      id: uid('xmlitem'),
      nItem: det.getAttribute ? (det.getAttribute('nItem') || String(idx+1)) : String(idx+1),
      sku: tagText(prod,'cProd') || `ITEM-${idx+1}`,
      ean: tagText(prod,'cEAN') || tagText(prod,'cEANTrib') || '',
      description: tagText(prod,'xProd') || `Produto ${idx+1}`,
      ncm: tagText(prod,'NCM') || '',
      cfop: tagText(prod,'CFOP') || '',
      unit: tagText(prod,'uCom') || tagText(prod,'uTrib') || 'UN',
      quantity: q || 1,
      unitValue: unit,
      totalValue: parseNumberBR(tagText(prod,'vProd')) || (q * unit)
    };
  });

  if(!items.length){
    throw new Error('Nenhum produto foi encontrado no XML.');
  }

  return {
    accessKey,
    number: tagText(ide,'nNF'),
    series: tagText(ide,'serie'),
    issueDate: tagText(ide,'dhEmi') || tagText(ide,'dEmi'),
    issuer: {
      name: tagText(emit,'xNome'),
      document: tagText(emit,'CNPJ') || tagText(emit,'CPF')
    },
    recipient: {
      name: tagText(dest,'xNome'),
      document: tagText(dest,'CNPJ') || tagText(dest,'CPF')
    },
    totalValue: parseNumberBR(tagText(total,'vNF')) || items.reduce((s,i)=>s+i.totalValue,0),
    items
  };
}

function createReturn(event){
  event.preventDefault();
  const keyInput = cleanDigits(document.getElementById('accessKey').value);
  let invoice = state.pendingInvoice ? structuredClone(state.pendingInvoice) : null;
  if(!invoice){
    if(keyInput.length !== 44){
      alert('Informe uma chave de acesso com 44 dígitos ou envie um XML válido.');
      return;
    }
    invoice = {
      accessKey:keyInput,
      number:'',
      series:'',
      issueDate:'',
      issuer:{name:'',document:''},
      recipient:{name:document.getElementById('customerName').value.trim(), document:cleanDigits(document.getElementById('customerDoc').value)},
      totalValue:0,
      items:[{
        id: uid('manualitem'),
        nItem:'1',
        sku:'PREENCHER-SKU',
        ean:'',
        description:'Produto a preencher manualmente',
        ncm:'',
        cfop:'',
        unit:'UN',
        quantity:1,
        unitValue:0,
        totalValue:0
      }]
    };
  } else if(keyInput && keyInput.length === 44) {
    invoice.accessKey = keyInput;
  }

  if(invoice.accessKey && invoice.accessKey.length !== 44){
    alert('A chave de acesso extraída/informada não possui 44 dígitos.');
    return;
  }

  if(state.rules.blockDuplicateInvoice && invoice.accessKey){
    const exists = state.returns.find(r => r.invoice?.accessKey === invoice.accessKey && r.status !== 'Cancelado');
    if(exists){
      alert(`Nota fiscal já vinculada ao processo ${exists.code}.`);
      return;
    }
  }

  const ret = {
    id: uid('ret'),
    code: 'DEV-' + new Date().toISOString().slice(2,10).replace(/-/g,'') + '-' + String(state.returns.length + 1).padStart(4,'0'),
    createdAt: nowIso(),
    updatedAt: nowIso(),
    createdBy: state.session.name,
    orderNumber: document.getElementById('orderNumber').value.trim(),
    marketplace: document.getElementById('marketplace').value,
    customerName: document.getElementById('customerName').value.trim() || invoice.recipient?.name || '',
    customerDoc: cleanDigits(document.getElementById('customerDoc').value) || invoice.recipient?.document || '',
    carrier: document.getElementById('carrier').value.trim(),
    trackingCode: document.getElementById('trackingCode').value.trim(),
    returnReason: document.getElementById('returnReason').value,
    responsible: state.session.name,
    receivedAt: document.getElementById('receivedAt').value,
    initialNote: document.getElementById('initialNote').value.trim(),
    status: 'Aguardando validação',
    invoice,
    xmlText: state.pendingXmlText,
    alerts: [],
    items: invoice.items.map(item => ({
      id: uid('item'),
      invoiceItemId: item.id,
      sku: item.sku,
      ean: item.ean,
      description: item.description,
      ncm: item.ncm,
      cfop: item.cfop,
      unit: item.unit,
      image: '',
      variation: '',
      soldQty: Number(item.quantity || 1),
      expectedQty: Number(item.quantity || 1),
      receivedQty: '',
      unitValue: Number(item.unitValue || 0),
      totalValue: Number(item.totalValue || 0),
      conferenceStatus: 'Pendente',
      physicalCondition: '',
      packageCondition: '',
      packageAction: '',
      severity: '',
      notes: '',
      evidences: [],
      destination: 'Análise manual',
      destinationReason: '',
      requiresApproval: false,
      approvalStatus: '',
      approvedBy: '',
      approvedAt: ''
    })),
    evidence: [],
    audit: []
  };

  ret.alerts = validateReturn(ret);
  addReturnAudit(ret, 'Devolução criada', `Pedido ${ret.orderNumber || '-'} / NF ${ret.invoice.number || '-'}`);
  if(ret.alerts.length) addReturnAudit(ret, 'Alertas de validação gerados', `${ret.alerts.length} alerta(s)`);
  state.returns.unshift(ret);
  state.currentReturnId = ret.id;
  state.pendingInvoice = null;
  state.pendingXmlText = '';
  render();
}

function validateReturn(ret){
  const alerts = [];
  if(!ret.invoice?.accessKey || ret.invoice.accessKey.length !== 44){
    alerts.push({level:'Crítica', message:'Chave de acesso ausente ou inválida.'});
  }
  if(!ret.orderNumber){
    alerts.push({level:'Média', message:'Número do pedido não informado.'});
  }
  if(ret.customerDoc && ret.invoice?.recipient?.document && cleanDigits(ret.customerDoc) !== cleanDigits(ret.invoice.recipient.document)){
    alerts.push({level:'Crítica', message:'CPF/CNPJ do cliente diverge do destinatário da NF-e.'});
  }
  if(!ret.items?.length){
    alerts.push({level:'Crítica', message:'Nenhum produto identificado na nota fiscal.'});
  }
  if(ret.invoice?.issueDate && state.rules.maxReturnDays){
    const emitted = new Date(ret.invoice.issueDate);
    if(!Number.isNaN(emitted.getTime())){
      const days = Math.floor((new Date() - emitted) / 86400000);
      if(days > Number(state.rules.maxReturnDays)){
        alerts.push({level:'Média', message:`Prazo de devolução acima da política configurada (${days} dias).`});
      }
    }
  }
  return alerts;
}

function renderReturnWorkflow(ret){
  const step = workflowStep(ret);
  return `
    <section>
      <div class="card">
        <div class="split">
          <div>
            <h2>${esc(ret.code)} · ${esc(ret.orderNumber || 'Pedido não informado')}</h2>
            <p>${esc(ret.marketplace || '-')} · Cliente: ${esc(ret.customerName || '-')} · Criado por ${esc(ret.createdBy || '-')}</p>
          </div>
          <div class="row-actions no-print">
            ${statusBadge(ret.status)}
            <button class="btn ghost" onclick="state.currentReturnId=null; nav('devolucoes')">Voltar</button>
          </div>
        </div>
        <div class="steps no-print" style="margin-top:16px">
          ${['Validação','Conferência','Inspeção','Destino','Resumo'].map((s,i)=>`<div class="step ${step===i?'active':''}">${i+1}. ${s}</div>`).join('')}
        </div>
        <div class="progress no-print"><span style="width:${(step+1)*20}%"></span></div>
      </div>
      <div style="margin-top:18px">
        ${step === 0 ? renderValidation(ret) : ''}
        ${step === 1 ? renderConference(ret) : ''}
        ${step === 2 ? renderInspection(ret) : ''}
        ${step === 3 ? renderDestination(ret) : ''}
        ${step === 4 ? renderSummary(ret) : ''}
      </div>
    </section>
  `;
}

function workflowStep(ret){
  if(ret.status === 'Aguardando validação') return 0;
  if(ret.status === 'Nota validada' || ret.status === 'Em conferência' || ret.status === 'Conferência com divergência') return 1;
  if(ret.status === 'Aguardando inspeção') return 2;
  if(ret.status === 'Aguardando destino' || ret.status === 'Aguardando aprovação') return 3;
  return 4;
}

function setReturnStatus(id, status){
  const ret = getReturn(id);
  if(!ret) return;
  const old = ret.status;
  ret.status = status;
  ret.updatedAt = nowIso();
  addReturnAudit(ret, 'Status alterado', `${old} → ${status}`);
  render();
}

function approveInvoice(id){
  const ret = getReturn(id);
  if(!ret) return;
  const critical = (ret.alerts || []).some(a => a.level === 'Crítica');
  if(critical && !hasPermission('approve')){
    alert('Existem alertas críticos. A validação exige supervisor ou administrador.');
    return;
  }
  ret.status = 'Nota validada';
  addReturnAudit(ret, 'Nota validada', critical ? 'Validação com alerta crítico aprovada por perfil autorizado' : 'Sem bloqueio crítico');
  setTimeout(() => setReturnStatus(id,'Em conferência'), 10);
}

        </thead>

function renderConferenceStatusSelect(retId,item){
  const opts = ['Pendente','Produto recebido corretamente','Produto recebido parcialmente','Produto não recebido','Produto diferente do esperado','Produto com avaria','Produto sem embalagem','Produto usado','Produto incompleto','Produto com acessórios faltantes'];
  return `<select onchange="updateItem('${retId}','${item.id}','conferenceStatus',this.value)">${opts.map(o=>`<option ${item.conferenceStatus===o?'selected':''}>${esc(o)}</option>`).join('')}</select>`;
}

function updateItem(retId,itemId,field,value){
  const ret = getReturn(retId);
  const item = ret?.items.find(i => i.id === itemId);
  if(!item) return;
  item[field] = value;
  if(field === 'receivedQty'){
    const rq = Number(value);
    if(!Number.isNaN(rq) && value !== ''){
      if(rq === Number(item.expectedQty)) item.conferenceStatus = 'Produto recebido corretamente';
      if(rq < Number(item.expectedQty)) item.conferenceStatus = 'Produto recebido parcialmente';
      if(rq === 0) item.conferenceStatus = 'Produto não recebido';
    }
  }
  ret.updatedAt = nowIso();
  addReturnAudit(ret, 'Item atualizado', `${item.sku}: ${field} = ${value}`);
  evaluateConference(ret);
  save();
  render();
}

function evaluateConference(ret){
  const alerts = validateReturn(ret);
  ret.items.forEach(item => {
    const rq = Number(item.receivedQty);
    if(item.receivedQty !== '' && rq < Number(item.expectedQty)){
      alerts.push({level:'Crítica', message:`Quantidade recebida menor que a nota para o SKU ${item.sku}.`});
    }
    if(item.receivedQty !== '' && rq > Number(item.expectedQty)){
      alerts.push({level:'Média', message:`Quantidade recebida maior que a nota para o SKU ${item.sku}.`});
    }
    if(item.conferenceStatus.includes('diferente')){
      alerts.push({level:'Crítica', message:`Produto recebido não corresponde ao SKU esperado: ${item.sku}.`});
    }
    if(item.conferenceStatus.includes('avaria')){
      alerts.push({level:'Média', message:`Produto apresenta avaria informada na conferência: ${item.sku}.`});
    }
    if(item.conferenceStatus.includes('sem embalagem')){
      alerts.push({level:'Média', message:`Embalagem original ausente para o SKU ${item.sku}.`});
    }
  });
  ret.alerts = dedupeAlerts(alerts);
  const allConferred = ret.items.every(i => i.receivedQty !== '' && i.conferenceStatus !== 'Pendente');
  if(allConferred && ret.status === 'Em conferência'){
    ret.status = ret.alerts.some(a => a.level === 'Crítica' || a.level === 'Média') ? 'Conferência com divergência' : 'Em conferência';
  }
}

function dedupeAlerts(alerts){
  const seen = new Set();
  return alerts.filter(a => {
    const key = a.level + a.message;
    if(seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

        </div>

function markAllReceived(retId){
  const ret = getReturn(retId);
  ret.items.forEach(item => {
    item.receivedQty = item.expectedQty;
    item.conferenceStatus = 'Produto recebido corretamente';
  });
  evaluateConference(ret);
  addReturnAudit(ret, 'Conferência automática', 'Todos os itens marcados como recebidos corretamente');
  render();
}

function scanBarcode(retId){
  const input = document.getElementById('barcodeInput');
  const code = cleanDigits(input.value);
  if(!code){ alert('Informe o EAN.'); return; }
  const ret = getReturn(retId);
  const item = ret.items.find(i => cleanDigits(i.ean) === code);
  if(!item){
    ret.alerts = dedupeAlerts([...(ret.alerts || []), {level:'Crítica', message:`Código de barras ${code} não localizado na NF-e.`}]);
    addReturnAudit(ret, 'EAN não localizado', code);
    render();
    return;
  }
  const current = Number(item.receivedQty || 0);
  item.receivedQty = Math.min(current + 1, Number(item.expectedQty || 1));
  item.conferenceStatus = Number(item.receivedQty) === Number(item.expectedQty) ? 'Produto recebido corretamente' : 'Produto recebido parcialmente';
  evaluateConference(ret);
  addReturnAudit(ret, 'EAN lido', `${code} vinculado ao SKU ${item.sku}`);
  render();
}

function goInspection(retId){
  const ret = getReturn(retId);
  const missing = ret.items.filter(i => i.receivedQty === '' || i.conferenceStatus === 'Pendente');
  if(missing.length && !confirm('Existem itens pendentes. Deseja seguir mesmo assim?')) return;
  ret.status = 'Aguardando inspeção';
  addReturnAudit(ret, 'Conferência enviada para inspeção', `${ret.items.length} item(ns)`);
  render();
}

function updateItemNoRender(retId,itemId,field,value){
  const ret = getReturn(retId);
  const item = ret?.items.find(i => i.id === itemId);
  if(!item) return;
  item[field] = value === 'Selecione' ? '' : value;
  ret.updatedAt = nowIso();
  addReturnAudit(ret, 'Inspeção atualizada', `${item.sku}: ${field} = ${item[field]}`);
  save();
}

function handleEvidenceUpload(input, retId, itemId){
  const ret = getReturn(retId);
  const item = ret?.items.find(i => i.id === itemId);
  if(!item) return;
  const files = Array.from(input.files || []);
  if(!files.length) return;
  let pending = files.length;
  files.forEach(file => {
    const ev = {
      id: uid('ev'),
      name: file.name,
      type: file.type || 'arquivo',
      size: file.size,
      uploadedBy: state.session.name,
      uploadedAt: nowIso(),
      preview: ''
    };
    const reader = new FileReader();
    reader.onload = function(){
      if(file.type.startsWith('image/') && file.size < 900000){
        ev.preview = String(reader.result || '');
      }
      item.evidences.push(ev);
      addReturnAudit(ret, 'Evidência anexada', `${file.name} no SKU ${item.sku}`);
      pending--;
      if(pending === 0) render();
    };
    reader.onerror = function(){
      item.evidences.push(ev);
      pending--;
      if(pending === 0) render();
    };
    reader.readAsDataURL(file);
  });
}

function renderEvidence(list){
  if(!list.length) return '<p class="hint">Nenhuma evidência anexada para este item.</p>';
  return `<div class="evidence-grid">${list.map(ev => `
    <div class="evidence">
      <strong>${esc(ev.name)}</strong><br>
      <span class="hint">${Math.round((ev.size || 0)/1024)} KB · ${esc(ev.uploadedBy || '-')}</span>
      ${ev.preview ? `<img src="${ev.preview}" alt="Evidência">` : ''}
    </div>`).join('')}</div>`;
}

function goDestination(retId){
  const ret = getReturn(retId);
  applyDecisionEngine(ret, false);
  ret.status = ret.items.some(i => i.requiresApproval) ? 'Aguardando aprovação' : 'Aguardando destino';
  addReturnAudit(ret, 'Motor de decisão executado', `${ret.items.length} item(ns) avaliados`);
  render();
}

function applyDecisionEngine(ret, rerender=true){
  ret.items.forEach(item => {
    const decision = decideDestination(item);
    item.destination = decision.destination;
    item.destinationReason = decision.reason;
    item.requiresApproval = requiresApproval(item);
    if(!item.requiresApproval) item.approvalStatus = '';
  });
  if(rerender) render();
}

function decideDestination(item){
  const status = (item.conferenceStatus || '').toLowerCase();
  const phy = (item.physicalCondition || '').toLowerCase();
  const pack = (item.packageCondition || '').toLowerCase();
  const packAction = (item.packageAction || '').toLowerCase();
  const received = Number(item.receivedQty || 0);
  const expected = Number(item.expectedQty || 0);

  if(status.includes('diferente') || status.includes('não recebido') || received < expected){
    return {destination:'Contestação', reason:'Produto ausente, divergente ou quantidade recebida inferior ao esperado.'};
  }
  if(status.includes('incompleto') || status.includes('acessórios faltantes') || phy.includes('peça faltante')){
    return {destination:'Contestação', reason:'Produto incompleto ou com acessórios faltantes.'};
  }
  if(phy.includes('sem condições') || phy.includes('quebrado') || phy.includes('molhado') || phy.includes('odor')){
    return {destination:'Descarte', reason:'Condição física impede revenda segura.'};
  }
  if(status.includes('avaria') || status.includes('usado') || phy.includes('sinais de uso') || phy.includes('rasgado') || phy.includes('manchado') || phy.includes('fora do padrão')){
    return {destination:'Quarentena', reason:'Item precisa de análise complementar antes de qualquer movimentação.'};
  }
  if(packAction.includes('reembalagem') || packAction.includes('substituir') || pack.includes('rasgada') || pack.includes('suja') || pack.includes('sem etiqueta') || pack.includes('sem embalagem') || pack.includes('incompatível')){
    return {destination:'Reparo/Reembalagem', reason:'Produto vendável, mas embalagem precisa de correção.'};
  }
  if(pack.includes('molhada')){
    return {destination:'Quarentena', reason:'Embalagem molhada exige retenção e avaliação de risco.'};
  }
  if(status.includes('corretamente') && (phy.includes('intacto') || !phy) && (pack.includes('lacrada') || pack.includes('reaproveitável') || pack.includes('presente') || !pack)){
    return {destination:'Reabastecimento', reason:'Quantidade correta, item íntegro e embalagem adequada.'};
  }
  return {destination:'Análise manual', reason:'Dados insuficientes para decisão automática segura.'};
}

function requiresApproval(item){
  if(item.destination === 'Descarte' && state.rules.requireSupervisorForDiscard) return true;
  if(item.destination === 'Contestação' && state.rules.requireSupervisorForContest) return true;
  if(Number(item.totalValue || 0) >= Number(state.rules.highValueThreshold || 0) && item.destination !== 'Reabastecimento') return true;
  if(item.severity === 'Crítica' || item.severity === 'Alta') return true;
  return false;
}

  return `
    <div class="item-card">
      <div class="split">
        <div>
          <strong>${esc(item.description)}</strong><br>
          <span class="hint">${esc(item.sku)} · Valor ${money(item.totalValue)} · Gravidade ${esc(item.severity || '-')}</span>
        </div>
        ${destBadge(item.destination)}
      </div>
      <p><strong>Justificativa:</strong> ${esc(item.destinationReason || 'Sem decisão calculada.')}</p>
      <div class="form-grid">
        <div class="field">
          <label>Alterar destino manualmente</label>
          <select onchange="overrideDestination('${ret.id}','${item.id}',this.value)">
            ${options.map(o=>`<option ${item.destination===o?'selected':''}>${esc(o)}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>Justificativa da alteração/manual</label>
          <input value="${esc(item.manualReason || '')}" onchange="updateItemNoRender('${ret.id}','${item.id}','manualReason',this.value)" placeholder="Obrigatória se alterar o destino">
        </div>
        <div class="field">
          <label>Aprovação</label>
          <div>
            ${item.requiresApproval ? `<span class="badge yellow">Exige aprovação</span>` : `<span class="badge green">Sem aprovação obrigatória</span>`}
            ${item.approvalStatus ? `<span class="badge ${item.approvalStatus==='Aprovado'?'green':'red'}">${esc(item.approvalStatus)}</span>` : ''}
          </div>
        </div>
      </div>
      ${!evidenceOk ? `<div class="alert critica"><strong>!</strong><div>Destino crítico sem evidência mínima. Anexe pelo menos ${state.rules.minCriticalPhotos} arquivo(s).</div></div>` : ''}
      ${item.requiresApproval ? `
        <div class="row-actions" style="margin-top:12px">
          <button class="btn success" onclick="approveDestination('${ret.id}','${item.id}',true)" ${hasPermission('approve')?'':'disabled'}>Aprovar destino</button>
          <button class="btn danger" onclick="approveDestination('${ret.id}','${item.id}',false)" ${hasPermission('approve')?'':'disabled'}>Reprovar</button>
        </div>

function overrideDestination(retId,itemId,value){
  const ret = getReturn(retId);
  const item = ret.items.find(i => i.id === itemId);
  item.destination = value;
  item.destinationReason = 'Destino alterado manualmente.';
  item.requiresApproval = true;
  item.approvalStatus = '';
  addReturnAudit(ret, 'Destino alterado manualmente', `${item.sku}: ${value}`);
  render();
}

function approveDestination(retId,itemId,approved){
  if(!hasPermission('approve')){
    alert('Ação restrita a Supervisor ou Administrador.');
    return;
  }
  const ret = getReturn(retId);
  const item = ret.items.find(i => i.id === itemId);
  item.approvalStatus = approved ? 'Aprovado' : 'Reprovado';
  item.approvedBy = state.session.name;
  item.approvedAt = nowIso();
  addReturnAudit(ret, approved ? 'Destino aprovado' : 'Destino reprovado', `${item.sku}: ${item.destination}`);
  ret.status = ret.items.some(i => i.requiresApproval && i.approvalStatus !== 'Aprovado') ? 'Aguardando aprovação' : 'Aguardando destino';
  render();
}

function goSummary(retId){
  const ret = getReturn(retId);
  const blocked = ret.items.filter(i => i.requiresApproval && i.approvalStatus !== 'Aprovado');
  if(blocked.length){
    alert('Existem itens que exigem aprovação antes do resumo final.');
    return;
  }
  const criticalWithoutEvidence = ret.items.filter(i => ['Descarte','Contestação','Quarentena'].includes(i.destination) && (i.evidences || []).length < Number(state.rules.minCriticalPhotos || 1));
  if(criticalWithoutEvidence.length){
    alert('Existem itens críticos sem evidência mínima.');
    return;
  }
  ret.status = aggregateStatus(ret);
  ret.finishedAt = nowIso();
  addReturnAudit(ret, 'Resumo gerado', `Status consolidado: ${ret.status}`);
  render();
}

function aggregateStatus(ret){
  const dests = ret.items.map(i => i.destination);
  if(dests.includes('Contestação')) return 'Contestação';
  if(dests.includes('Descarte')) return 'Descarte';
  if(dests.includes('Quarentena')) return 'Quarentena';
  if(dests.includes('Reparo/Reembalagem')) return 'Reparo/Reembalagem';
  if(dests.every(d => d === 'Reabastecimento')) return 'Aprovado para estoque';
  return 'Finalizado';
}

function download(filename, text, type='text/plain;charset=utf-8'){
  const blob = new Blob([text], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function csvEscape(v){
  const s = String(v ?? '');
  return '"' + s.replace(/"/g,'""') + '"';
}

function exportReturnsCsv(){
  const rows = [['Codigo','Pedido','Marketplace','Cliente','NF','Chave','Status','Criado em','Itens','Destinos','Alertas']];
  state.returns.forEach(r => rows.push([
    r.code, r.orderNumber, r.marketplace, r.customerName, r.invoice?.number, r.invoice?.accessKey,
    r.status, brDate(r.createdAt), r.items.length,
    r.items.map(i => `${i.sku}:${i.destination}`).join(' | '),
    (r.alerts || []).map(a => `${a.level}:${a.message}`).join(' | ')
  ]));
  download('devolucoes.csv', rows.map(row => row.map(csvEscape).join(';')).join('\n'), 'text/csv;charset=utf-8');
}

function exportAuditCsv(){
  const rows = [['Data','Usuario','Perfil','Acao','Entidade','ID','Detalhe','IP']];
  state.audit.forEach(l => rows.push([brDate(l.at), l.userName, l.role, l.action, l.entityType, l.entityId, l.detail, l.ip]));
  download('auditoria.csv', rows.map(row => row.map(csvEscape).join(';')).join('\n'), 'text/csv;charset=utf-8');
}

function downloadReturnJson(retId){
  const ret = getReturn(retId);
  download(`${ret.code}.json`, JSON.stringify(ret,null,2), 'application/json;charset=utf-8');
}

function downloadReturnCsv(retId){
  const ret = getReturn(retId);
  const rows = [['Codigo','Pedido','SKU','EAN','Descricao','Qtd esperada','Qtd recebida','Status conferencia','Condicao fisica','Embalagem','Destino','Justificativa','Evidencias']];
  ret.items.forEach(i => rows.push([ret.code, ret.orderNumber, i.sku, i.ean, i.description, i.expectedQty, i.receivedQty, i.conferenceStatus, i.physicalCondition, i.packageCondition, i.destination, i.destinationReason, (i.evidences || []).length]));
  download(`${ret.code}-itens.csv`, rows.map(row => row.map(csvEscape).join(';')).join('\n'), 'text/csv;charset=utf-8');
}

            const diffClass = item.quantity_difference > 0 ? 'pos' : item.quantity_difference < 0 ? 'neg' : 'ok';
            return `<tr>
              <td><strong>${esc(item.physical_product_name || item.description)}</strong><br><span class="hint">NF-e: ${esc(item.invoice_product_name || item.description)} · ${money(item.totalValue)}</span></td>
              <td>${esc(item.physical_sku || item.sku || '-')}<br><span class="hint">${esc(item.physical_ean || item.ean || '-')}</span></td>
              <td>${num(item.invoice_quantity)} ${esc(item.unit || '')}</td>
              <td>${editable ? `<input type="number" min="0" step="0.0001" value="${esc(item.physical_received_quantity)}" onchange="updateItem('${ret.id}','${item.id}','physical_received_quantity',this.value)">` : esc(item.physical_received_quantity || '0')}</td>
              <td><span class="qty-diff ${diffClass}">${item.quantity_difference > 0 ? '+' : ''}${num(item.quantity_difference)}</span><br><span class="hint">${esc(item.quantity_status)}</span></td>
              <td>${editable ? renderConferenceStatusSelect(ret.id,item) : esc(item.conferenceStatus)}</td>
              <td>${destBadge(item.destination)}</td>
            </tr>`;
          }).join('')}</tbody>
        </table>
      </div>`;
  };

  window.updateItem = function(retId,itemId,field,value){
    const ret = getReturn(retId);
    const item = ret?.items.find(i => i.id === itemId);
    if(!item) return;
    if(field === 'receivedQty') field = 'physical_received_quantity';
    item[field] = ['physical_received_quantity','invoice_quantity','approved_quantity','blocked_quantity'].includes(field) && value !== '' ? Number(value) : value;
    if(field === 'physical_received_quantity'){
      item.receivedQty = item.physical_received_quantity;
      normalizeQtyFields(item);
      const rq = Number(item.physical_received_quantity || 0);
      if(value !== ''){
        if(rq === Number(item.invoice_quantity)) item.conferenceStatus = 'Produto recebido corretamente';
        if(rq < Number(item.invoice_quantity)) item.conferenceStatus = rq === 0 ? 'Produto não recebido' : 'Produto recebido parcialmente';
        if(rq > Number(item.invoice_quantity)) item.conferenceStatus = 'Produto recebido parcialmente';
      }
    } else {
      normalizeQtyFields(item);
    }
    ret.updatedAt = nowIso();
    addReturnAudit(ret, 'Item atualizado', `${item.sku}: ${field} = ${value}`);
    evaluateConference(ret);
    save(); render();
  };

  window.updateItemNoRender = function(retId,itemId,field,value){
    const ret = getReturn(retId);
    const item = ret?.items.find(i => i.id === itemId);
    if(!item) return;
    item[field] = value;
    normalizeQtyFields(item);
    ret.updatedAt = nowIso();
    save();
  };

  window.evaluateConference = function(ret){
    const alerts = validateReturn(ret);
    ret.items.forEach(item => {
      normalizeQtyFields(item);
      if(item.physical_received_quantity !== '' && item.quantity_difference < 0){
        alerts.push({level:'Crítica', message:`Quantidade física menor que a NF-e para o SKU ${item.sku}. Diferença: ${item.quantity_difference}.`});
      }
      if(item.physical_received_quantity !== '' && item.quantity_difference > 0){
        alerts.push({level:'Média', message:`Quantidade física maior que a NF-e para o SKU ${item.sku}. Diferença: +${item.quantity_difference}. Excedente exige análise.`});
      }
      if((item.conferenceStatus || '').includes('diferente')) alerts.push({level:'Crítica', message:`Produto recebido não corresponde ao SKU esperado: ${item.sku}.`});
      if((item.conferenceStatus || '').includes('avaria')) alerts.push({level:'Média', message:`Produto apresenta avaria informada na conferência: ${item.sku}.`});
      if((item.conferenceStatus || '').includes('sem embalagem')) alerts.push({level:'Média', message:`Embalagem original ausente para o SKU ${item.sku}.`});
    });
    ret.alerts = dedupeAlerts(alerts);
    const allConferred = ret.items.every(i => i.physical_received_quantity !== '' && i.conferenceStatus !== 'Pendente');
    if(allConferred && ret.status === 'Em conferência') ret.status = ret.alerts.some(a => ['Crítica','Média'].includes(a.level)) ? 'Conferência com divergência' : 'Em conferência';
  };

  window.markAllReceived = function(retId){
    const ret = getReturn(retId);
    ret.items.forEach(item => { item.physical_received_quantity = item.invoice_quantity || item.expectedQty; item.receivedQty = item.physical_received_quantity; normalizeQtyFields(item); item.conferenceStatus = 'Produto recebido corretamente'; });
    evaluateConference(ret); addReturnAudit(ret, 'Conferência automática', 'Todos os itens marcados conforme NF-e'); render();
  };

  window.scanBarcode = function(retId){
    const input = document.getElementById('barcodeInput');
    const code = cleanDigits(input.value);
    if(!code){ alert('Informe o EAN.'); return; }
    const ret = getReturn(retId);
    const item = ret.items.find(i => cleanDigits(i.ean) === code || cleanDigits(i.physical_ean) === code);
    if(!item){
      ret.alerts = dedupeAlerts([...(ret.alerts || []), {level:'Crítica', message:`Código de barras ${code} não localizado na NF-e.`}]);
      addReturnAudit(ret, 'EAN não localizado', code); render(); return;
    }
    const current = Number(item.physical_received_quantity || 0);
    item.physical_received_quantity = current + 1;
    item.receivedQty = item.physical_received_quantity;
    normalizeQtyFields(item);
    item.conferenceStatus = item.quantity_difference === 0 ? 'Produto recebido corretamente' : 'Produto recebido parcialmente';
    evaluateConference(ret); addReturnAudit(ret, 'EAN lido', `${code} vinculado ao SKU ${item.sku}. Qtd física: ${item.physical_received_quantity}`); render();
  };

  window.decideDestination = function(item){
    normalizeQtyFields(item);
    const status = (item.conferenceStatus || '').toLowerCase();
    const phy = (item.physicalCondition || '').toLowerCase();
    const pack = (item.packageCondition || '').toLowerCase();
    const packAction = (item.packageAction || '').toLowerCase();
    if(item.quantity_difference > 0) return {destination:'Análise manual', reason:'Quantidade física maior que a NF-e. Excedente bloqueado para análise/quarentena.'};
    if(status.includes('diferente') || status.includes('não recebido') || item.quantity_difference < 0) return {destination:'Contestação', reason:'Produto ausente, divergente ou quantidade recebida inferior ao esperado.'};
    if(status.includes('incompleto') || status.includes('acessórios faltantes') || phy.includes('peça faltante')) return {destination:'Contestação', reason:'Produto incompleto ou com acessórios faltantes.'};
    if(phy.includes('sem condições') || phy.includes('quebrado') || phy.includes('molhado') || phy.includes('odor')) return {destination:'Descarte', reason:'Condição física impede revenda segura.'};
    if(status.includes('avaria') || status.includes('usado') || phy.includes('sinais de uso') || phy.includes('rasgado') || phy.includes('manchado') || phy.includes('fora do padrão')) return {destination:'Quarentena', reason:'Item precisa de análise complementar antes de qualquer movimentação.'};
    if(packAction.includes('reembalagem') || packAction.includes('substituir') || pack.includes('rasgada') || pack.includes('suja') || pack.includes('sem etiqueta') || pack.includes('sem embalagem') || pack.includes('incompatível')) return {destination:'Reparo/Reembalagem', reason:'Produto vendável, mas embalagem precisa de correção.'};
    if(pack.includes('molhada')) return {destination:'Quarentena', reason:'Embalagem molhada exige retenção e avaliação de risco.'};
    if(status.includes('corretamente') && item.quantity_difference === 0 && (phy.includes('intacto') || !phy) && (pack.includes('lacrada') || pack.includes('reaproveitável') || pack.includes('presente') || !pack)) return {destination:'Reabastecimento', reason:'Quantidade correta, item íntegro e embalagem adequada.'};
    return {destination:'Análise manual', reason:'Dados insuficientes para decisão automática segura.'};
  };

  const oldRenderInspectionItem = renderInspectionItem;
  window.renderInspectionItem = function(ret,item){
    normalizeQtyFields(item);
    const diffClass = item.quantity_difference > 0 ? 'pos' : item.quantity_difference < 0 ? 'neg' : 'ok';
    return oldRenderInspectionItem(ret,item).replace(
      `<span class="hint">${esc(item.sku)} · EAN ${esc(item.ean || '-')} · Qtd recebida ${esc(item.receivedQty || '0')}/${esc(item.expectedQty)}</span>`,
      `<span class="hint">${esc(item.sku)} · EAN ${esc(item.ean || '-')} · NF-e ${num(item.invoice_quantity)} · Físico ${num(item.physical_received_quantity || 0)} · <span class="qty-diff ${diffClass}">${item.quantity_difference>0?'+':''}${num(item.quantity_difference)}</span></span>`
    );
  };

  const oldRenderSummary = renderSummary;
  window.renderSummary = function(ret){
    const canCorrect = ['Administrador','Supervisor','Auditor'].includes(state.session.role);
    const html = oldRenderSummary(ret);
    const correction = canCorrect ? `<button class="btn warning" onclick="startCorrection('${ret.id}')">Corrigir devolução</button>` : '';
    return html.replace(`<button class="btn primary" onclick="finalizeReturn('${ret.id}')">Finalizar processo</button>`, `<button class="btn primary" onclick="finalizeReturn('${ret.id}')">Finalizar processo</button>${correction}`);
  };

  window.startCorrection = function(retId){
    const ret = getReturn(retId);
    if(!ret) return;
    if(!['Administrador','Supervisor','Auditor'].includes(state.session.role)){ alert('Ação restrita.'); return; }
    const reason = prompt('Informe o motivo obrigatório da correção:');
    if(!reason || !reason.trim()) return;
    const oldSnapshot = JSON.parse(JSON.stringify(ret));
    ret.corrections = ret.corrections || [];
    ret.revisionNumber = Number(ret.revisionNumber || 1) + 1;
    ret.correctionReason = reason.trim();
    ret.correctionStartedAt = nowIso();
    ret.correctionStartedBy = state.session.name;
    ret.corrections.unshift({id:uid('corr'), revisionNumber:ret.revisionNumber, requestedBy:state.session.name, correctionReason:reason.trim(), status:'Em edição', oldValues:oldSnapshot, createdAt:nowIso()});
    ret.status = 'Correção em andamento';
    addReturnAudit(ret, 'Correção iniciada', `Revisão ${ret.revisionNumber}: ${reason}`);
    state.currentReturnId = ret.id; state.route='nova'; render();
  };

  const oldWorkflowStep = workflowStep;
  window.workflowStep = function(ret){
    if(ret.status === 'Correção em andamento') return 1;
    return oldWorkflowStep(ret);
  };

  const oldFinalizeReturn = finalizeReturn;
  window.finalizeReturn = function(retId){
    const ret = getReturn(retId);
    if(ret?.status === 'Correção em andamento'){
      ret.items.forEach(normalizeQtyFields);
      const current = ret.corrections?.[0];
      if(current){ current.status='Finalizada'; current.finalizedAt=nowIso(); current.newValues=JSON.parse(JSON.stringify(ret)); current.impactSummary='Estoque devolvido, indicadores e visão por SKU recalculados pela quantidade física.'; }
      ret.status = aggregateStatus(ret) || 'Finalizado';
      ret.finishedAt = nowIso();
      addReturnAudit(ret, 'Correção finalizada', `Revisão ${ret.revisionNumber} concluída e estoque recalculado.`);
      render(); return;
    }
    oldFinalizeReturn(retId);
  };

  function allStockRows(){
    const rows = [];
    state.returns.filter(r=>r.status!=='Cancelado').forEach(ret=>{
      (ret.items||[]).forEach(item=>{
        normalizeQtyFields(item);
        const qty = Number(item.physical_received_quantity || 0);
        if(qty <= 0 && !['Finalizado','Aprovado para estoque','Quarentena','Descarte','Contestação','Reparo/Reembalagem','Correção em andamento'].includes(ret.status)) return;
        const finalDest = item.destination || 'Aguardando decisão';
        rows.push({ret,item,qty,sku:item.sku_group_key,ean:item.physical_ean||item.ean,product:item.physical_product_name||item.description,destination:finalDest,location:item.location || defaultLocationForDest(finalDest),availability:availabilityForDest(finalDest,item),value:Number(item.unitValue||0)*qty,days:daysSince(ret.receivedAt||ret.createdAt)});
      });
    });
    return rows;
  }
  window.allStockRows = allStockRows;

  function defaultLocationForDest(dest){
    if(dest === 'Reabastecimento') return 'Estoque principal';
    if(dest === 'Quarentena') return 'Quarentena';
    if(dest === 'Descarte') return 'Descarte';
    if(dest === 'Reparo/Reembalagem') return 'Reembalagem';
    if(dest === 'Contestação') return 'Aguardando marketplace';
    return 'Área de devoluções';
  }
  function availabilityForDest(dest,item){
    if(dest === 'Reabastecimento' && Number(item.quantity_difference||0)===0) return 'Disponível para venda';
    if(dest === 'Descarte') return 'Baixado por descarte';
    if(dest === 'Contestação') return 'Bloqueado por contestação';
    if(dest === 'Quarentena') return 'Bloqueado por quarentena';
    if(dest === 'Reparo/Reembalagem') return 'Bloqueado por falta de embalagem';
    return 'Bloqueado para venda';
  }
  function daysSince(v){ const d=new Date(v); return Number.isNaN(d.getTime())?0:Math.max(0,Math.floor((new Date()-d)/86400000)); }

  function aggregateBySku(rows){
    const map = new Map();
    rows.forEach(r=>{
      const key = r.sku || 'SEM-SKU';
      if(!map.has(key)) map.set(key,{sku:key,ean:r.ean,product:r.product,variation:r.item.variation||'',category:r.item.category||'',total:0,value:0,reabastecimento:0,quarentena:0,reparo:0,reembalagem:0,descarte:0,contestacao:0,transferencia:0,outlet:0,perda:0,retornoFornecedor:0,aguardando:0,available:0,blocked:0,lastReturnAt:'',returns:new Set(),days:[],rows:[]});
      const g = map.get(key); g.total += r.qty; g.value += r.value; g.returns.add(r.ret.id); g.days.push(r.days); g.rows.push(r); if(!g.lastReturnAt || new Date(r.ret.receivedAt||r.ret.createdAt)>new Date(g.lastReturnAt)) g.lastReturnAt = r.ret.receivedAt||r.ret.createdAt;
      const d = (r.destination||'').toLowerCase();
      if(d.includes('reabastecimento')) g.reabastecimento += r.qty;
      else if(d.includes('quarentena')) g.quarentena += r.qty;
      else if(d.includes('reparo')) g.reparo += r.qty;
      else if(d.includes('reembalagem')) g.reembalagem += r.qty;
      else if(d.includes('descarte')) g.descarte += r.qty;
      else if(d.includes('contest')) g.contestacao += r.qty;
      else if(d.includes('transfer')) g.transferencia += r.qty;
      else if(d.includes('outlet')) g.outlet += r.qty;
      else if(d.includes('perda')) g.perda += r.qty;
      else if(d.includes('fornecedor')) g.retornoFornecedor += r.qty;
      else g.aguardando += r.qty;
      if(r.availability === 'Disponível para venda') g.available += r.qty; else g.blocked += r.qty;
    });
    return [...map.values()].map(g=>({...g,relatedReturnsCount:g.returns.size,avgDays:g.days.length?Math.round(g.days.reduce((a,b)=>a+b,0)/g.days.length):0}));
  }
  window.aggregateBySku = aggregateBySku;

  window.renderReturnedStock = function(){
    const view = state.stockView || 'sku';
    const rows = filterStockRows(allStockRows());
    const skuAgg = aggregateBySku(rows);
    const totalUnits = rows.reduce((s,r)=>s+r.qty,0);
    const blocked = rows.filter(r=>r.availability!=='Disponível para venda').reduce((s,r)=>s+r.qty,0);
    const quarantine = rows.filter(r=>r.destination==='Quarentena').reduce((s,r)=>s+r.qty,0);
    const disc = rows.filter(r=>r.destination==='Descarte').reduce((s,r)=>s+r.qty,0);
    return `
      <section class="grid cols-4">
        ${metricCard('SKUs com devolução', skuAgg.length, 'Produtos consolidados', 'SKU')}
        ${metricCard('Unidades devolvidas', num(totalUnits), 'Quantidade física recebida', '▥')}
        ${metricCard('Unidades bloqueadas', num(blocked), 'Quarentena, contestação, descarte ou análise', '⚠')}
        ${metricCard('Valor devolvido', money(rows.reduce((s,r)=>s+r.value,0)), 'Base física recebida', 'R$')}
      </section>
      <div class="card" style="margin-top:18px">
        <div class="split"><div><h2>Estoque Devolvido</h2><p>Alterne entre visões operacionais. A visão por SKU consolida as quantidades por situação.</p></div><div class="row-actions"><button class="btn" onclick="exportSkuStockCsv()">Exportar SKU CSV</button><button class="btn" onclick="window.print()">Imprimir / PDF</button></div></div>
        <div class="tabbar">
          ${[['devolucao','Por devolução'],['item','Por item'],['sku','Por produto/SKU'],['localizacao','Por localização'],['destino','Por destino final']].map(([k,l])=>`<button class="${view===k?'active':''}" onclick="state.stockView='${k}'; save(); render()">${l}</button>`).join('')}
        </div>
        <div class="form-grid two">
          <div class="field"><label>Busca</label><input value="${esc(state.filters.returnSearch||'')}" oninput="state.filters.returnSearch=this.value; render()" placeholder="SKU, produto, pedido, NF-e, cliente"></div>
          <div class="field"><label>Filtro rápido</label><select onchange="state.filters.stockQuick=this.value; render()"><option ${!state.filters.stockQuick?'selected':''} value="">Todos</option><option ${state.filters.stockQuick==='blocked'?'selected':''} value="blocked">Apenas bloqueados</option><option ${state.filters.stockQuick==='diff'?'selected':''} value="diff">Com divergência física</option><option ${state.filters.stockQuick==='positive'?'selected':''} value="positive">Qtd física maior que NF-e</option><option ${state.filters.stockQuick==='quarantine'?'selected':''} value="quarantine">Em quarentena</option></select></div>
        </div>
      </div>
      <div class="card" style="margin-top:18px">${view==='sku'?renderStockSkuTable(skuAgg):view==='item'?renderStockItemTable(rows):view==='localizacao'?renderGroupedStock(rows,'location','Localização'):view==='destino'?renderGroupedStock(rows,'destination','Destino final'):renderGroupedStock(rows,'ret.code','Devolução')}</div>`;
  };

  function filterStockRows(rows){
    const q=(state.filters.returnSearch||'').toLowerCase().trim();
    let out=rows;
    if(q) out=out.filter(r=>[r.sku,r.ean,r.product,r.ret.code,r.ret.orderNumber,r.ret.invoice?.number,r.ret.invoice?.accessKey,r.ret.customerName,r.destination,r.location].join(' ').toLowerCase().includes(q));
    const f=state.filters.stockQuick;
    if(f==='blocked') out=out.filter(r=>r.availability!=='Disponível para venda');
    if(f==='diff') out=out.filter(r=>Number(r.item.quantity_difference||0)!==0);
    if(f==='positive') out=out.filter(r=>Number(r.item.quantity_difference||0)>0);
    if(f==='quarantine') out=out.filter(r=>r.destination==='Quarentena');
    return out;
  }

  function renderStockSkuTable(list){
    if(!list.length) return empty('Sem estoque devolvido para exibir. Finalize uma devolução ou ajuste os filtros.');
    return `<h2>Estoque por Produto/SKU</h2><div class="table-wrap" style="margin-top:14px"><table class="wide-table"><thead><tr><th class="sticky-first">SKU</th><th>Produto</th><th>Total</th><th>Valor</th><th>Reabast.</th><th>Quarentena</th><th>Reparo</th><th>Reembal.</th><th>Descarte</th><th>Contest.</th><th>Transf.</th><th>Outlet</th><th>Aguard.</th><th>Disponível</th><th>Bloqueada</th><th>Última</th><th>Devoluções</th><th>Ações</th></tr></thead><tbody>${list.map(g=>`<tr><td class="sticky-first"><strong>${esc(g.sku)}</strong><br><span class="hint">EAN ${esc(g.ean||'-')}</span></td><td>${esc(g.product||'-')}</td><td><strong>${num(g.total)}</strong></td><td>${money(g.value)}</td><td>${num(g.reabastecimento)}</td><td>${num(g.quarentena)}</td><td>${num(g.reparo)}</td><td>${num(g.reembalagem)}</td><td>${num(g.descarte)}</td><td>${num(g.contestacao)}</td><td>${num(g.transferencia)}</td><td>${num(g.outlet)}</td><td>${num(g.aguardando)}</td><td>${num(g.available)}</td><td>${num(g.blocked)}</td><td>${brDate(g.lastReturnAt)}</td><td>${g.relatedReturnsCount}</td><td><button class="btn small" onclick="openSkuDetail('${esc(g.sku)}')">Detalhe</button></td></tr>`).join('')}</tbody></table></div>`;
  }

  function renderStockItemTable(rows){
    if(!rows.length) return empty('Sem itens.');
    return `<h2>Estoque por item</h2><div class="table-wrap"><table><thead><tr><th>Devolução</th><th>SKU</th><th>Produto</th><th>Qtd NF-e</th><th>Qtd física</th><th>Dif.</th><th>Destino</th><th>Localização</th><th>Disp.</th><th>Ação</th></tr></thead><tbody>${rows.map(r=>`<tr><td><strong>${esc(r.ret.code)}</strong><br><span class="hint">${esc(r.ret.orderNumber||'-')}</span></td><td>${esc(r.sku)}</td><td>${esc(r.product)}</td><td>${num(r.item.invoice_quantity)}</td><td>${num(r.qty)}</td><td>${r.item.quantity_difference>0?'+':''}${num(r.item.quantity_difference)}</td><td>${destBadge(r.destination)}</td><td>${esc(r.location)}</td><td>${esc(r.availability)}</td><td><button class="btn small" onclick="openReturn('${r.ret.id}')">Abrir</button></td></tr>`).join('')}</tbody></table></div>`;
  }

  function renderGroupedStock(rows,key,label){
    const grouped = {};
    rows.forEach(r=>{ let k=key==='ret.code'?r.ret.code:r[key]; grouped[k||'Não informado']=(grouped[k||'Não informado']||0)+r.qty; });
    return `<h2>${label}</h2>${Object.keys(grouped).length ? renderBars(grouped) : empty('Sem dados.')}`;
  }

  window.openSkuDetail = function(sku){
    const rows = allStockRows().filter(r=>r.sku===sku);
    const g = aggregateBySku(rows)[0]; if(!g) return;

  function transferImpactForKey(key, ignoreTransferId=''){
    ensureTransferState();
    let reserved=0, transferred=0, discarded=0, writtenOff=0, inTransit=0;
    (state.transferItems||[]).forEach(ti=>{
      if(ti.stock_key !== key && transferKey(ti.return_id, ti.return_item_id) !== key) return;
      const tr = (state.transfers||[]).find(t=>t.id===ti.transfer_id);
      if(!tr || tr.id===ignoreTransferId || ['Cancelada','Recusada'].includes(tr.status)) return;
      const q=Number(ti.quantity||0);
      const type=String(tr.type||'').toLowerCase();
      if(['Rascunho','Pendente de envio'].includes(tr.status)) reserved += q;
      if(['Enviada','Em trânsito','Recebida','Parcialmente recebida','Finalizada'].includes(tr.status)){
        if(type.includes('descarte')) discarded += q;
        else if(type.includes('perda') || type.includes('doação')) writtenOff += q;
        else transferred += q;
        if(['Enviada','Em trânsito'].includes(tr.status)) inTransit += q;
      }
    });
    return {reserved, transferred, discarded, writtenOff, inTransit};
  }

  window.createTransfer = function(event){
    event.preventDefault(); ensureTransferState(); const type=val('tr_type'); const destName=val('tr_destination_name'); const destAddr=val('tr_destination_address'); if(!destName||!destAddr) return alert('Destino e endereço são obrigatórios.');
